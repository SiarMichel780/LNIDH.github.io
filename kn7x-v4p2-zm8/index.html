<div id="mainScreen" style="display:none;">

    <h2 id="welcomeText"></h2>

    <hr>

    <h3>Create Event</h3>

    <input
        id="eventTitle"
        placeholder="Event Name"
    >

    <br><br>

    <input
        id="eventLocation"
        placeholder="Location"
    >

    <br><br>

    <textarea
        id="eventDescription"
        placeholder="What are we doing?"
    ></textarea>

    <br><br>

    <input
        type="date"
        id="eventDate"
    >

    <br><br>

    <input
        type="time"
        id="eventTime"
    >

    <br><br>

    <select id="eventGroup">

        <option value="general">
            General Hangouts
        </option>

        <option value="knotts">
            Knott's Pass Holders
        </option>

    </select>

    <br><br>

    <button id="createEventBtn">
        Create Event
    </button>

    <hr>

    <h3>Upcoming Events</h3>

    <div id="eventsContainer">

    </div>

</div>
